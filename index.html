<!DOCTYPE html>
<html>
<head>
	<link rel="icon" type="image/png" href="favicon.png">
	<title>
		Josh Muthu
	</title>
	<style>
		#art-container {
			height: 300px;
			max-width: 70vw;
			overflow: hidden;
			margin: 0 auto;
			display: flex;
			justify-content: center;
			align-items: center;
		}
		#art {
			cursor: pointer;
			user-select: text;
			line-height: 1.2;
			margin: 0;
			display: inline-block;
			text-align: left;
		}
		main {
			text-align: center;
		}
		ul {
			display: inline-block;
			text-align: left;
			padding: 0;
			margin-top: 0;
		}
	</style>
</head>

<body>
	<main>
		<div id="art-container"><pre id="art" onclick="cycleArt()"></pre></div>
		<h2>Josh Muthu</h2>
		<h2 style="margin-bottom: 0;">=== Links ===</h2>
		<ul>
			<li><a href="https://www.linkedin.com/in/joshuamuthu/">LinkedIn</a></li>
			<li><a href="https://joshuamuthu.substack.com/">Substack</a></li>
			<li><a href="https://github.com/j-muthu">GitHub</a></li>
			<li><a href="https://x.com/joshua_muthu">Twitter</a></li>
			<li><a href="https://curius.app/joshua-muthu">Curius</a></li>
		</ul>
	</main>

<script>
let arts = [];
let idx = 0;
const BASE_FONT_SIZE = 16;

const artFiles = [
	'alligator', 'alpha', 'ansi_compact', 'arabic', 'armenian', 'aurebesh',
	'big', 'big_money_nw', 'blurvision_ascii', 'cherokee', 'coder_mini',
	'coptic', 'cuneiform', 'cyrillic', 'devanagari', 'doh', 'doom',
	'elder_futhark', 'fire_font_k', 'fraktur', "ge'ez", 'glagolitic',
	'hebrew', 'hieroglyphs', 'kannada', 'katakana', 'mandalorian',
	'mkhedruli', 'roman', 'simplified_chinese', 'slant_relief', 'tamil',
	'tengwar_annatar', 'tengwar_artano', 'terrace', 'univers', 'younger_futhark'
];

Promise.all(artFiles.map(name =>
	fetch('text_art/' + name + '.txt').then(r => r.text())
)).then(texts => {
	arts = texts.map((t, i) => ({ text: t, name: artFiles[i] })).filter(a => a.text.trim().length > 0);
	idx = Math.floor(Math.random() * arts.length);
	displayArt(idx);
});

function displayArt(i) {
	const el = document.getElementById('art');
	const container = document.getElementById('art-container');

	// Render at base size to measure natural text dimensions
	el.style.fontSize = BASE_FONT_SIZE + 'px';
	el.textContent = arts[i].text;
	el.title = arts[i].name;

	const naturalW = el.scrollWidth;
	const naturalH = el.scrollHeight;

	const containerH = container.clientHeight;
	const containerW = container.clientWidth;

	const scaleW = containerW / naturalW;
	const scaleH = containerH / naturalH;
	const fontSize = BASE_FONT_SIZE * Math.min(scaleW, scaleH);

	el.style.fontSize = fontSize + 'px';
}

function cycleArt() {
	if (arts.length <= 1) return;
	let next;
	do { next = Math.floor(Math.random() * arts.length); } while (next === idx);
	idx = next;
	displayArt(idx);
}
</script>
</body>

</html>
