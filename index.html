<!DOCTYPE html>
<html>
<head>
	<link rel="icon" type="image/png" href="favicon.png">
	<title>
		Josh Muthu
	</title>
	<style>
		#art-container {
			height: 300px;
			max-width: 70vw;
			overflow: hidden;
		}
		#art {
			cursor: pointer;
			user-select: text;
			line-height: 1.2;
			margin: 0;
		}
	</style>
</head>

<body>
	<main>
		<div id="art-container"><pre id="art" onclick="cycleArt()"></pre></div>
		<br><br>
		<h2>===Links===</h2>
		<ul>
			<li><a href="https://x.com/joshua_muthu">Twitter</a></li>
			<li><a href="https://www.linkedin.com/in/joshuamuthu/">LinkedIn</a></li>
			<li><a href="https://joshuamuthu.substack.com/">Substack</a></li>
			<li><a href="https://curius.app/joshua-muthu">Curius</a></li>
		</ul>
	</main>

<script>
let arts = [];
let idx = 0;
const BASE_FONT_SIZE = 16;

fetch('art.txt')
	.then(r => r.text())
	.then(text => {
		text = text.replace(/\r\n/g, '\n');
		arts = text.split(/\n\n\n\n/)
			.map(p => p.replace(/^([ \t]*\n)+/, '').replace(/(\n[ \t]*)+$/, ''))
			.filter(p => p.length > 0);
		idx = Math.floor(Math.random() * arts.length);
		displayArt(idx);
	});

function displayArt(i) {
	const el = document.getElementById('art');
	const container = document.getElementById('art-container');

	// Render at base size to measure natural text dimensions
	el.style.fontSize = BASE_FONT_SIZE + 'px';
	el.textContent = arts[i];

	const naturalW = el.scrollWidth;
	const naturalH = el.scrollHeight;

	const containerH = container.clientHeight;
	const containerW = container.clientWidth;

	const scaleW = containerW / naturalW;
	const scaleH = containerH / naturalH;
	const fontSize = BASE_FONT_SIZE * Math.min(scaleW, scaleH);

	el.style.fontSize = fontSize + 'px';
}

function cycleArt() {
	if (arts.length <= 1) return;
	let next;
	do { next = Math.floor(Math.random() * arts.length); } while (next === idx);
	idx = next;
	displayArt(idx);
}
</script>
</body>

</html>
